services:
  postgres:
    image: postgres:16-alpine
    container_name: ethics-postgres
    environment:
      POSTGRES_DB: ethics_dev
      POSTGRES_USER: ethics
      POSTGRES_PASSWORD: ethics_dev_password
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ethics -d ethics_dev']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: ethics-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  clamav:
    image: clamav/clamav:latest
    platform: linux/amd64
    container_name: ethics-clamav
    ports:
      - '3310:3310'
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ['CMD', '/usr/local/bin/clamdcheck.sh']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

volumes:
  postgres_data:
  minio_data:
  clamav_data:
